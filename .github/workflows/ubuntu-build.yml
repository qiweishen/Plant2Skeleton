name: Ubuntu Build

on: [ push, pull_request ]

jobs:
    build:
        name: "Ubuntu - ${{ matrix.build_type }}"
        strategy:
            fail-fast: false
            matrix:
                build_type: [ Debug, Release ]
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   name: Install Dependencies
                run: |
                    sudo apt-get update || true
                    sudo apt-get install -y build-essential cmake ninja-build \
                         libomp-dev libboost-all-dev \
                         libgl1-mesa-dev libglu1-mesa-dev libglfw3-dev libglew-dev \
                         libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libx11-dev

            -   name: Configure
                run: cmake -S . -B build/${{ matrix.build_type }} -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

            -   name: Build
                run: cmake --build build/${{ matrix.build_type }} --parallel
