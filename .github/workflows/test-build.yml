name: Test Build SkelSeg

on: [ push, pull_request ]

jobs:
    build:
        name: "Build on ${{ matrix.platform }} - ${{ matrix.build_type }}"
        strategy:
            fail-fast: false
            matrix:
                platform: [ windows-latest, ubuntu-latest, macos-latest ]
                build_type: [ Debug, Release ]
        runs-on: ${{ matrix.platform }}

        steps:
            # Checkout the code
            -   uses: actions/checkout@v4

            # Install dependencies for each platform
            -   name: Install Dependencies (Ubuntu)
                if: runner.os == 'Linux'
                run: |
                    sudo apt-get update || true
                    sudo apt-get install -y build-essential cmake ninja-build \
                         libomp-dev libboost-all-dev \
                         libgl1-mesa-dev libglu1-mesa-dev libglfw3-dev libglew-dev \
                         libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libx11-dev

            -   name: Install Dependencies (macOS)
                if: runner.os == 'macOS'
                run: |
                    brew update || true
                    brew install cmake ninja libomp boost glfw glew

            # Set up Conda on Windows
            -   name: Set up Conda (Windows)
                if: runner.os == 'Windows'
                uses: conda-incubator/setup-miniconda@v3
                with:
                    architecture: x64
                    activate-environment: SkelSeg-Dev
                    auto-activate-base: false
                    channels: conda-forge,defaults

            # Install Conda packages on Windows
            -   name: Install Dependencies via Conda (Windows)
                if: runner.os == 'Windows'
                shell: bash -l {0}
                run: |
                    conda install -y \
                      ninja \
                      llvm-openmp \
                      libboost-devel \
                      glfw \
                      glew

            # Configure the project
            -   name: Configure (Linux & macOS & Windows)
                shell: bash -l {0}
                run: |
                    cmake -S . -B build/${{ matrix.build_type }} -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

            # Build the project
            -   name: Build (Linux & macOS)
                if: runner.os != 'Windows'
                run: cmake --build build/${{ matrix.build_type }} --parallel

            -   name: Build (Windows)
                if: runner.os == 'Windows'
                shell: bash -l {0}
                run: cmake --build build/${{ matrix.build_type }} --config ${{ matrix.build_type }} --parallel
