services:
    skelseg-dev:
        container_name: skelseg-dev
        build:
            context: ..
            dockerfile: Docker/Dockerfile
            # Match container's `dev` user to the host user so files
            # under /workspace get correct ownership. Override in .env:
            #   USER_UID=$(id -u)
            #   USER_GID=$(id -g)
            args:
                USER_UID: ${USER_UID:-1000}
                USER_GID: ${USER_GID:-1000}

        # Keep container running for interactive use
        stdin_open: true
        tty: true

        # Network and IPC
        network_mode: host
        ipc: host

        # Debugging support
        cap_add:
            - SYS_PTRACE
        security_opt:
            - seccomp:unconfined
            - apparmor:unconfined

        environment:
            PYTHONUNBUFFERED: 1
            # X11 — run `xhost +local:` on the host once per session.
            # No XAUTHORITY: we rely on the abstract Unix socket + xhost,
            # which avoids the brittle ~/.Xauthority bind mount.
            DISPLAY: ${DISPLAY:-:0}
            # Wayland
            WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-}
            # Container's runtime dir is keyed off the dev user's UID.
            XDG_RUNTIME_DIR: /run/user/${USER_UID:-1000}
            # Audio
            PULSE_SERVER: ${PULSE_SERVER:-unix:/run/user/${USER_UID:-1000}/pulse/native}
            # Software rendering (set 0 for GPU acceleration)
            LIBGL_ALWAYS_SOFTWARE: 1

        volumes:
            - ..:/workspace
            # X11 socket
            - /tmp/.X11-unix:/tmp/.X11-unix:rw
            # User runtime (audio, D-Bus, etc.) — host XDG_RUNTIME_DIR
            # is mapped to the container's UID-keyed path so paths inside
            # the container match what apps expect.
            - ${XDG_RUNTIME_DIR:-/run/user/1000}:/run/user/${USER_UID:-1000}

            # Optional mounts
            - /mnt/SharedData/SkelSeg-Appendix:/workspace/dataset

            # WSLg (only on WSL2 hosts):
            # - /mnt/wslg:/mnt/wslg

        working_dir: /workspace

        # Nvidia GPU (requires nvidia-container-toolkit)
        # runtime: nvidia
        # environment:
        #   NVIDIA_VISIBLE_DEVICES: all
        #   NVIDIA_DRIVER_CAPABILITIES: all
